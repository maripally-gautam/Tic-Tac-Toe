name: tictactoe_arcade
description: A premium high-fidelity Tic Tac Toe game with smooth animations, synthesized retro sounds, and realtime online multiplayer.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: ^6.1.1
  
  # Realtime networking mapping Node Socket.IO API
  socket_io_client: ^3.0.1
  
  # Interactive fluid micro-animations & transitions
  flutter_animate: ^4.5.0
  
  # Audio effects for tactile feeling
  audioplayers: ^5.2.1
  
  # Dynamic visual confetti bursts on win
  confetti: ^0.7.0
  
  # Icons
  lucide_icons: ^0.320.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/click.wav
    - assets/sounds/move_x.wav
    - assets/sounds/move_o.wav
    - assets/sounds/win.wav
    - assets/sounds/lose.wav
    - assets/sounds/draw.wav
    - assets/sounds/join_lobby.wav
    - assets/sounds/chat_sent.wav
